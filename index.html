<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: white;
      font-family: sans-serif;
    }

    #sketch-container {
      width: 100%;
      height: 100vh;
    }

    .upload-ui {
      position: fixed;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .upload-ui input {
      font-size: 12px;
    }
  </style>
</head>

<body>

  <!-- Upload simples -->
  <div class="upload-ui">
    <input type="file" id="upload-x1" accept="image/*">
    <input type="file" id="upload-x2" accept="image/*">
    <input type="file" id="upload-x3" accept="image/*">
  </div>

  <div id="sketch-container"></div>

  <script src="sketch.js"></script>

</body>
</html>
